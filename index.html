<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>照片墙</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f7;
            min-height: 100vh;
            padding-bottom: 100px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .upload-area {
            margin: 20px 16px;
            background: white;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .upload-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 32px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            min-height: 48px;
        }

        .upload-btn:active {
            transform: scale(0.96);
        }

        #fileInput {
            display: none;
        }

        .gallery {
            columns: 2;
            column-gap: 8px;
            padding: 0 8px;
        }

        .photo-item {
            break-inside: avoid;
            margin-bottom: 8px;
            border-radius: 10px;
            overflow: hidden;
            background: #e0e0e0;
            cursor: pointer;
        }

        .photo-item img {
            width: 100%;
            display: block;
            object-fit: cover;
        }

        .empty-tip {
            text-align: center;
            color: #999;
            padding: 60px 20px;
            font-size: 14px;
        }

        .clear-btn {
            display: block;
            margin: 20px auto 0;
            background: #fff;
            border: 1px solid #ddd;
            color: #666;
            padding: 12px 28px;
            border-radius: 24px;
            font-size: 14px;
            cursor: pointer;
            min-height: 44px;
            min-width: 140px;
        }

        .clear-btn:active {
            background: #f0f0f0;
        }

        /* 自定义确认弹窗 - 彻底解决iframe拦截问题 */
        .confirm-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .confirm-modal.show {
            display: flex;
        }

        .confirm-box {
            background: white;
            border-radius: 14px;
            width: 280px;
            padding: 24px 20px;
            text-align: center;
        }

        .confirm-box h3 {
            font-size: 17px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .confirm-box p {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        .confirm-btns {
            display: flex;
            gap: 12px;
        }

        .confirm-btns button {
            flex: 1;
            padding: 10px 0;
            border-radius: 8px;
            border: none;
            font-size: 15px;
            cursor: pointer;
            min-height: 40px;
        }

        .btn-cancel {
            background: #f2f2f7;
            color: #333;
        }

        .btn-confirm {
            background: #ff3b30;
            color: white;
        }

        /* 预览弹窗 */
        .preview-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }

        .preview-modal.show {
            display: flex;
        }

        .preview-modal img {
            max-width: 100%;
            max-height: 100%;
        }

        .close-preview {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 30px;
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="header">
    </div>
       <h1>📸 湘桥村-端午节照片打卡墙</h1>
        <p>游客拍照上传，留下美好瞬间</p>
    <div class="upload-area">
        <label class="upload-btn" for="fileInput">📷 拍照 / 选择照片</label>
        <input type="file" id="fileInput" accept="image/*" capture="environment" multiple>
        <button class="clear-btn" id="clearBtn">清空全部照片</button>
    </div>

    <div class="gallery" id="gallery"></div>
    <div class="empty-tip" id="emptyTip">还没有照片噢，快来上传第一张叭～</div>

    <!-- 图片预览 -->
    <div class="preview-modal" id="previewModal">
        <span class="close-preview" id="closePreview">×</span>
        <img id="previewImg" src="" alt="">
    </div>

    <!-- 自定义确认弹窗 -->
    <div class="confirm-modal" id="confirmModal">
        <div class="confirm-box">
            <h3>确认清空</h3>
            <p>确定要删除所有照片吗？此操作不可恢复</p>
            <div class="confirm-btns">
                <button class="btn-cancel" id="cancelClear">取消</button>
                <button class="btn-confirm" id="confirmClear">确定清空</button>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const gallery = document.getElementById('gallery');
        const emptyTip = document.getElementById('emptyTip');
        const previewModal = document.getElementById('previewModal');
        const previewImg = document.getElementById('previewImg');
        const closePreview = document.getElementById('closePreview');
        const clearBtn = document.getElementById('clearBtn');
        const confirmModal = document.getElementById('confirmModal');
        const cancelClear = document.getElementById('cancelClear');
        const confirmClear = document.getElementById('confirmClear');

        let photos = JSON.parse(localStorage.getItem('photos') || '[]');
        renderGallery();

        // 上传照片
        fileInput.addEventListener('change', function(e) {
            const files = e.target.files;
            if (!files.length) return;
            for (let file of files) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    compressImage(event.target.result, 800, 0.7, function(compressed) {
                        photos.unshift(compressed);
                        savePhotos();
                        renderGallery();
                    });
                };
                reader.readAsDataURL(file);
            }
            fileInput.value = '';
        });

        // 点击清空 - 弹出自定义确认框
        clearBtn.addEventListener('click', function() {
            confirmModal.classList.add('show');
        });

        // 取消清空
        cancelClear.addEventListener('click', function() {
            confirmModal.classList.remove('show');
        });

        // 确认清空 - 执行删除
        confirmClear.addEventListener('click', function() {
            photos = [];
            savePhotos();
            renderGallery();
            confirmModal.classList.remove('show');
        });

        // 渲染照片墙
        function renderGallery() {
            if (photos.length === 0) {
                emptyTip.style.display = 'block';
                gallery.innerHTML = '';
                return;
            }
            emptyTip.style.display = 'none';
            gallery.innerHTML = photos.map((src, index) => `
                <div class="photo-item" data-index="${index}">
                    <img src="${src}" alt="照片" loading="lazy">
                </div>
            `).join('');

            document.querySelectorAll('.photo-item').forEach(item => {
                item.addEventListener('click', function() {
                    previewImg.src = photos[this.dataset.index];
                    previewModal.classList.add('show');
                });
            });
        }

        // 图片压缩
        function compressImage(src, maxWidth, quality, callback) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                let width = img.width, height = img.height;
                if (width > maxWidth) {
                    height = height * (maxWidth / width);
                    width = maxWidth;
                }
                canvas.width = width;
                canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                callback(canvas.toDataURL('image/jpeg', quality));
            };
            img.src = src;
        }

        // 保存本地
        function savePhotos() {
            try {
                localStorage.setItem('photos', JSON.stringify(photos));
            } catch (e) {
                alert('存储空间不足');
            }
        }

        // 关闭预览
        closePreview.addEventListener('click', function() {
            previewModal.classList.remove('show');
        });
        previewModal.addEventListener('click', function(e) {
            if (e.target === previewModal) previewModal.classList.remove('show');
        });
    </script>
</body>
</html>
